name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build publish directory
        run: |
          mkdir -p publish/v2
          cp index.html styles.css robots.txt sitemap.xml CNAME publish/
          cp -r assets publish/
          cp -r v2/* publish/v2/
          if [ -f publish/v2/index_v2.html ]; then mv publish/v2/index_v2.html publish/v2/index.html; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - id: deployment
        uses: actions/deploy-pages@v4
